<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Book Store</title>
    <style>
        body {
            background-color: #f4f4f9; /* Soft light background */
        }
        .navbar {
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .form-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h4 {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #007bff;
            display: inline-block;
            padding-bottom: 5px;
        }
        .btn-primary {
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="#">📚 Book Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link text-white" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="available_books">Available Books</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="my_books">My Books</a>
                </li>
            </ul>
            <div>
                <a class="btn btn-outline-light" href="book_register">+ Register New Book</a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="col-md-6 offset-md-3 form-card">
        <h4>Register New Book</h4>
        <form th:action="@{/save}" method="post">
            <div class="mb-3">
                <label class="form-label">Book Name</label>
                <input type="text" class="form-control" name="name" placeholder="Enter book name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Author</label>
                <input type="text" class="form-control" name="author" placeholder="Enter author's name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Book Price</label>
                <input type="number" step="0.01" class="form-control" name="price" placeholder="Enter price" required>
            </div>
            <button type="submit" class="btn btn-primary">📌 Submit</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
